<!DOCTYPE html>
<html>
<head>
<title>Checkout - GreenNest</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f7f3;
}

.navbar{
    background:#2e7d32;
    color:white;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
}

.logo{
    font-size:30px;
    font-weight:bold;
}

.checkout-container{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:25px;
    padding:40px 8%;
}

/* LEFT SIDE */
.left-section{
    display:flex;
    flex-direction:column;
    gap:20px;
}

/* PRODUCTS */
.cart-items{
    background:white;
    padding:20px;
    border-radius:15px;
}

.cart-card{
    display:flex;
    gap:15px;
    margin-bottom:15px;
    padding-bottom:15px;
    border-bottom:1px solid #eee;
}

.cart-card img{
    width:100px;
    height:100px;
    object-fit:cover;
    border-radius:10px;
}

/* FORM */
.form-box{
    background:white;
    padding:20px;
    border-radius:15px;
}

.form-box h3{
    margin-bottom:15px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

textarea{
    resize:none;
    height:80px;
}

/* SUMMARY */
.summary{
    background:white;
    padding:20px;
    border-radius:15px;
    height:fit-content;
}

.row{
    display:flex;
    justify-content:space-between;
    margin:15px 0;
}

.buy-btn{
    width:100%;
    padding:15px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

.buy-btn:hover{
    background:#256428;
}
</style>
</head>

<body>

<nav class="navbar">
    <div class="logo">GreenNest</div>
</nav>

<div class="checkout-container">

    <!-- LEFT SIDE -->
    <div class="left-section">

        <!-- PRODUCTS -->
        <div class="cart-items">
            <h2>Your Products</h2>
            <div id="cartContainer"></div>
        </div>

        <!-- SHIPPING FORM -->
        <div class="form-box">
            <h3>Shipping Details</h3>

            <input type="text" id="name" placeholder="Full Name">
            <input type="text" id="phone" placeholder="Phone Number">
            <textarea id="address" placeholder="Full Address"></textarea>

            <input type="text" id="city" placeholder="City">
            <input type="text" id="pincode" placeholder="Pincode">
        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="summary">
        <h2>Billing Summary</h2>

        <div class="row">
            <span>Subtotal</span>
            <span id="subtotal">₹0</span>
        </div>

        <div class="row">
            <span>Delivery</span>
            <span>₹50</span>
        </div>

        <div class="row">
            <span>GST (5%)</span>
            <span id="gst">₹0</span>
        </div>

        <hr>

        <div class="row">
            <b>Total</b>
            <b id="total">₹0</b>
        </div>

        <button class="buy-btn">Place Order</button>
    </div>

</div>

<script>

const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    window.location.href = "login.html";
}

const userId = user._id;

async function loadCheckout() {

    const buyNowProduct = JSON.parse(localStorage.getItem("buyNowProduct"));
    const container = document.getElementById("cartContainer");

    let subtotal = 0;
    container.innerHTML = "";

    // BUY NOW
    if (buyNowProduct) {
        subtotal = buyNowProduct.price * buyNowProduct.quantity;

        container.innerHTML = `
        <div class="cart-card">
            <img src="http://localhost:5000/uploads/${buyNowProduct.image}">
            <div>
                <h3>${buyNowProduct.name}</h3>
                <p>Price: ₹${buyNowProduct.price}</p>
                <p>Qty: ${buyNowProduct.quantity}</p>
            </div>
        </div>
        `;
    }

    // CART ITEMS
    else {
        const res = await fetch(`http://localhost:5000/cart/${userId}`);
        const cart = await res.json();

        if (!cart.items.length) {
            container.innerHTML = "<h3>Your cart is empty</h3>";
            return;
        }

        cart.items.forEach(item => {
            const p = item.productId;
            subtotal += p.price * item.quantity;

            container.innerHTML += `
            <div class="cart-card">
                <img src="http://localhost:5000/uploads/${p.image}">
                <div>
                    <h3>${p.name}</h3>
                    <p>Price: ₹${p.price}</p>
                    <p>Qty: ${item.quantity}</p>
                </div>
            </div>
            `;
        });
    }

    const gst = subtotal * 0.05;
    const total = subtotal + gst + 50;

    document.getElementById("subtotal").innerText = "₹" + subtotal;
    document.getElementById("gst").innerText = "₹" + gst.toFixed(2);
    document.getElementById("total").innerText = "₹" + total.toFixed(2);
}


// PLACE ORDER
document.querySelector(".buy-btn").addEventListener("click", async () => {

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;
    const address = document.getElementById("address").value;
    const city = document.getElementById("city").value;
    const pincode = document.getElementById("pincode").value;

    if (!name || !phone || !address || !city || !pincode) {
        alert("Please fill all details");
        return;
    }

    const buyNowProduct = JSON.parse(localStorage.getItem("buyNowProduct"));

    const orderData = {
        userId,
        shipping: { name, phone, address, city, pincode }
    };

    // BUY NOW ORDER
    if (buyNowProduct) {

        orderData.productId = buyNowProduct.productId;
        orderData.quantity = buyNowProduct.quantity;

        const res = await fetch("http://localhost:5000/orders/buynow", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(orderData)
        });

        const data = await res.json();

        if (res.ok) {
            alert("Order placed successfully!");
            localStorage.removeItem("buyNowProduct");
            window.location.href = "success.html";
        } else {
            alert(data.message);
        }
    }

    // CART ORDER
    else {
        const res = await fetch("http://localhost:5000/orders", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify(orderData)
        });

        const data = await res.json();

        if (res.ok) {
            alert("Order placed successfully!");
            window.location.href = "success.html";
        } else {
            alert(data.message);
        }
    }
});

loadCheckout();

</script>

</body>
</html>
