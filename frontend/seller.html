<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GreenNest Seller Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}
body{
    background:#f4f8f4;
}
.navbar{
    background:#2e7d32;
    color:white;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.navbar h1{
    font-size:28px;
}
.nav-right{
    display:flex;
    gap:15px;
    align-items:center;
}
.nav-right input{
    padding:10px 15px;
    width:250px;
    border:none;
    border-radius:20px;
}
.nav-right button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}
.container{
    width:90%;
    margin:auto;
    padding:30px 0;
}
.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:30px;
}
.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
    text-align:center;
}
.card h2{
    color:#2e7d32;
    margin-top:10px;
}
.form-box{
    background:white;
    padding:25px;
    border-radius:15px;
    margin-bottom:30px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}
.form-box h2{
    margin-bottom:20px;
    color:#2e7d32;
}
.form-box input,
.form-box textarea,
.form-box select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}
.form-box button{
    width:100%;
    padding:12px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}
.products{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    margin-bottom:40px;
}
.product-card{
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}
.product-card img{
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:10px;
}
.product-card h3{
    margin:10px 0;
}
.orders{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}
th{
    background:#2e7d32;
    color:white;
}
select{
    padding:8px;
    border-radius:6px;
}

@media(max-width:900px){
    .stats,.products{
        grid-template-columns:repeat(2,1fr);
    }
}
@media(max-width:600px){
    .stats,.products{
        grid-template-columns:1fr;
    }

    .navbar{
        flex-direction:column;
        gap:15px;
    }
}
/* PROFILE DROPDOWN */
.profile-wrapper{
    position:relative;
}

.profile-btn{
    background:white;
    color:#2e7d32;
    border:none;
    padding:10px 16px;
    border-radius:25px;
    cursor:pointer;
    font-weight:bold;
}

.profile-dropdown{
    display:none;
    position:absolute;
    right:0;
    top:55px;
    background:white;
    width:280px;
    padding:18px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
    z-index:999;
}

.profile-dropdown p{
    margin:10px 0;
    color:#333;
}

.logout-btn{
    width:100%;
    margin-top:15px;
    padding:12px;
    background:#d32f2f;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar">
    <h1>🌿 GreenNest Seller</h1>

    <div class="nav-right">
        <input type="text" id="searchInput" placeholder="Search products...">

        <div class="profile-wrapper">
            <button id="profileBtn" class="profile-btn">
                👤 <span id="sellerName">Seller</span> ▼
            </button>

            <div id="profileDropdown" class="profile-dropdown">
                <p><b>Name:</b> <span id="profileName"></span></p>
                <p><b>Email:</b> <span id="profileEmail"></span></p>
                <p><b>Phone:</b> <span id="profilePhone"></span></p>
                <p><b>Role:</b> <span id="profileRole"></span></p>

                <button onclick="logout()" class="logout-btn">
                    Logout
                </button>
            </div>
        </div>
    </div>
</nav>

<div class="container">

<!-- STATS -->
<div class="stats">
    <div class="card">
        <h3>Total Products</h3>
        <h2 id="totalProducts">0</h2>
    </div>

    <div class="card">
        <h3>Orders</h3>
        <h2 id="totalOrders">0</h2>
    </div>

    <div class="card">
        <h3>Revenue</h3>
        <h2 id="totalRevenue">₹0</h2>
    </div>

    <div class="card">
        <h3>Pending Deliveries</h3>
        <h2 id="pendingDeliveries">0</h2>
    </div>
</div>

<!-- ADD PRODUCT -->
<div class="form-box">
    <h2>Add Product</h2>

    <form id="productForm" enctype="multipart/form-data">
        <input type="text" name="name" placeholder="Product Name" required>
        <input type="number" name="price" placeholder="Price" required>

        <select name="category" required>
    <option value="plants">Plants</option>
    <option value="seeds">Seeds</option>
    <option value="pots">Pots</option>
    <option value="tools">Tools</option>
</select>
        <textarea name="description" placeholder="Description"></textarea>

        <input type="file" name="image" required>
        <input type="number" name="discount" placeholder="Discount %">
        <input type="number" name="rating" placeholder="Rating">

        <button type="submit">Add Product</button>
    </form>
</div>
<!-- PRODUCTS SECTION -->
<h2 style="margin-bottom:20px;color:#2e7d32;">My Products</h2>
<div class="products" id="productsContainer">
    <!-- Products from MongoDB will appear here -->
</div>

<!-- ORDERS SECTION -->
<div class="orders">
    <h2 style="color:#2e7d32;">Orders Management</h2>

    <table>
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Customer Name</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Address</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="ordersTable">
            <!-- Orders from MongoDB will appear here -->
        </tbody>
    </table>
</div>

<!-- ANALYTICS -->
<div class="orders" style="margin-top:40px;">
    <h2 style="color:#2e7d32;">Sales Analytics</h2>

    <div style="margin-top:30px;">
        <h3>Daily Sales</h3>
        <canvas id="dailySalesChart"></canvas>
    </div>

    <div style="margin-top:40px;">
        <h3>Monthly Revenue</h3>
        <canvas id="monthlyRevenueChart"></canvas>
    </div>

    <div style="margin-top:40px;">
        <h3>Best Selling Categories</h3>
        <canvas id="categoryChart"></canvas>
    </div>
</div>
<script>
const seller = JSON.parse(localStorage.getItem("user"));
const sellerId = seller._id;

const productForm = document.querySelector(".form-box form");
const productsContainer = document.querySelector(".products");
const ordersTable = document.querySelector(".orders table");


// ================= LOAD SELLER PRODUCTS =================
async function loadProducts() {
    try {
        const res = await fetch(`http://localhost:5000/products/seller/${sellerId}`);
        const products = await res.json();

        productsContainer.innerHTML = "";

        products.forEach(product => {
            productsContainer.innerHTML += `
                <div class="product-card">
                    <img src="http://localhost:5000/uploads/${product.image}">
                    <h3>${product.name}</h3>
                    <p>₹${product.price}</p>
                    <p>${product.category}</p>
                </div>
            `;
        });

        document.getElementById("totalProducts").innerText = products.length;
    } catch (err) {
        console.log(err);
    }
}


// ================= ADD PRODUCT =================
productForm.addEventListener("submit", async function(e){
    e.preventDefault();

    const formData = new FormData(productForm);

    formData.append("sellerId", sellerId);
    formData.append("sellerName", seller.name);

    try {
        const res = await fetch("http://localhost:5000/products/add", {
            method: "POST",
            body: formData
        });

        const data = await res.json();
        alert(data.message);

        productForm.reset();
        loadProducts();

    } catch (err) {
        console.log(err);
    }
});


// ================= LOAD SELLER ORDERS =================
async function loadOrders() {
    try {
        const res = await fetch(`http://localhost:5000/orders/seller/${sellerId}`);
        const orders = await res.json();

        ordersTable.innerHTML = `
            <tr>
                <th>Order ID</th>
                <th>Customer Name</th>
                <th>Product</th>
                <th>Quantity</th>
                <th>Address</th>
                <th>Status</th>
            </tr>
        `;

        let totalOrders = 0;
        let pending = 0;
        let revenue = 0;

        orders.forEach(order => {
            order.items.forEach(item => {
                if (item.sellerId === sellerId) {
                    totalOrders++;
                    revenue += item.price * item.quantity;

                    if (order.status !== "Delivered") {
                        pending++;
                    }

                    ordersTable.innerHTML += `
                        <tr>
                            <td>${order._id.slice(-5)}</td>
                            <td>${order.customerName || "Customer"}</td>
                            <td>${item.productName}</td>
                            <td>${item.quantity}</td>
                            <td>${order.address || "N/A"}</td>
                            <td>
                                <button class="status-btn ${order.status.toLowerCase()}"
                                    onclick="updateStatus('${order._id}')">
                                    ${order.status}
                                </button>
                            </td>
                        </tr>
                    `;
                }
            });
        });

        document.getElementById("totalOrders").innerText = totalOrders;
        document.getElementById("pendingDeliveries").innerText = pending;
        document.getElementById("totalRevenue").innerText = "₹" + revenue;

    } catch (err) {
        console.log(err);
    }
}


// ================= UPDATE ORDER STATUS =================
async function updateStatus(orderId) {
    const statuses = ["Pending", "Packed", "Shipped", "Delivered"];

    const currentBtn = event.target;
    const currentStatus = currentBtn.innerText;

    let index = statuses.indexOf(currentStatus);
    let nextStatus = statuses[(index + 1) % statuses.length];

    try {
        await fetch(`http://localhost:5000/orders/status/${orderId}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                status: nextStatus
            })
        });

        loadOrders();

    } catch (err) {
        console.log(err);
    }
}


// ================= CHARTS =================
let dailyChart;
let monthlyChart;
let categoryChart;

async function loadAnalytics() {
    const seller = JSON.parse(localStorage.getItem("user"));
    const sellerId = seller._id;

    const res = await fetch(`http://localhost:5000/analytics/${sellerId}`);
    const data = await res.json();

    const dailyLabels = Object.keys(data.dailySales);
    const dailyValues = Object.values(data.dailySales);

    const monthlyLabels = Object.keys(data.monthlyRevenue);
    const monthlyValues = Object.values(data.monthlyRevenue);

    const categoryLabels = Object.keys(data.categorySales);
    const categoryValues = Object.values(data.categorySales);

    if (dailyChart) dailyChart.destroy();
    if (monthlyChart) monthlyChart.destroy();
    if (categoryChart) categoryChart.destroy();

    dailyChart = new Chart(document.getElementById("dailySalesChart"), {
        type: "line",
        data: {
            labels: dailyLabels,
            datasets: [{
                label: "Daily Sales",
                data: dailyValues,
                borderColor: "green",
                fill: false
            }]
        }
    });

    monthlyChart = new Chart(document.getElementById("monthlyRevenueChart"), {
        type: "bar",
        data: {
            labels: monthlyLabels,
            datasets: [{
                label: "Revenue",
                data: monthlyValues,
                backgroundColor: "green"
            }]
        }
    });

    categoryChart = new Chart(document.getElementById("categoryChart"), {
        type: "pie",
        data: {
            labels: categoryLabels,
            datasets: [{
                data: categoryValues,
                backgroundColor: ["green", "orange", "brown", "blue"]
            }]
        }
    });
}
// ================= LOGOUT =================
function logout(){
    localStorage.removeItem("user");
    window.location.href = "login.html";
}
function loadSellerProfile(){
    const seller = JSON.parse(localStorage.getItem("user"));

    if(!seller) return;

    document.getElementById("sellerName").innerText =
        seller.name || "Seller";

    document.getElementById("profileName").innerText =
        seller.name || "N/A";

    document.getElementById("profileEmail").innerText =
        seller.email || "N/A";

    document.getElementById("profilePhone").innerText =
        seller.phone || "N/A";

    document.getElementById("profileRole").innerText =
        seller.role || "Seller";
}
const profileBtn = document.getElementById("profileBtn");
const profileDropdown = document.getElementById("profileDropdown");

profileBtn.addEventListener("click", function(){
    if(profileDropdown.style.display === "block"){
        profileDropdown.style.display = "none";
    } else {
        profileDropdown.style.display = "block";
    }
});

document.addEventListener("click", function(event){
    if(
        !profileBtn.contains(event.target) &&
        !profileDropdown.contains(event.target)
    ){
        profileDropdown.style.display = "none";
    }
});


// ================= INITIAL LOAD =================
loadSellerProfile();
loadProducts();
loadOrders();
loadAnalytics();
</script>
</body>
</html>
