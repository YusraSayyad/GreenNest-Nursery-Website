<!DOCTYPE html>
<html>
<head>
    <title>GreenNest Register</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#e8f5e9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            width:400px;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:green;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:darkgreen;
        }

        p{
            text-align:center;
            margin-top:15px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Register</h2>

    <form id="registerForm">
        <input type="text" id="name" placeholder="Enter Name" required>
        <input type="email" id="email" placeholder="Enter Email" required>
        <input type="text" id="address" placeholder="Enter Address" required>
        <input type="text" id="phone" placeholder="Enter Phone Number" required>
        <input type="password" id="password" placeholder="Enter Password" required>

        <button type="submit">Register</button>
    </form>

    <p id="message"></p>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const selectedRole = params.get("role") || "user";

document.getElementById("registerForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const userData = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        address: document.getElementById("address").value,
        phone: document.getElementById("phone").value,
        password: document.getElementById("password").value,
        role: selectedRole
    };

    try {
        const response = await fetch("http://localhost:5000/users/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(userData)
        });

        const data = await response.json();
        const message = document.getElementById("message");

        if (response.ok) {
            message.style.color = "green";
            message.innerText = "Registration successful!";

            setTimeout(() => {
                window.location.href = `login.html?role=${selectedRole}`;
            }, 1500);
        } else {
            message.style.color = "red";
            message.innerText = data.message || "Registration failed";
        }

    } catch (error) {
        console.error(error);
        document.getElementById("message").style.color = "red";
        document.getElementById("message").innerText = "Server not responding";
    }
});
</script>
</body>
</html>
