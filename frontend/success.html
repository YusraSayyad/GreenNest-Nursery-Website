<!DOCTYPE html>
<html>
<head>
<title>Order Success - GreenNest</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f7f3;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* CARD */
.success-card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
    animation:fadeIn 0.8s ease-in-out;
    width:350px;
}

/* CHECK ANIMATION */
.checkmark{
    width:100px;
    height:100px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:0 auto 20px;
    background:#2e7d32;
    animation:pop 0.6s ease;
}

.checkmark:after{
    content:"✔";
    font-size:50px;
    color:white;
}

/* TEXT */
h2{
    color:#2e7d32;
    margin-bottom:10px;
}

p{
    color:#555;
    margin-bottom:20px;
}

/* BUTTON */
.btn{
    padding:12px 20px;
    border:none;
    background:#2e7d32;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.btn:hover{
    background:#256428;
}

/* ANIMATIONS */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes pop{
    0%{transform:scale(0);}
    70%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

.progress-bar{
    height:4px;
    width:100%;
    background:#e0e0e0;
    margin-top:20px;
    border-radius:5px;
    overflow:hidden;
}

.progress{
    height:100%;
    width:0%;
    background:#2e7d32;
    animation:load 3s linear forwards;
}

@keyframes load{
    from{width:0%;}
    to{width:100%;}
}
</style>
</head>

<body>

<div class="success-card">

    <div class="checkmark"></div>

    <h2>Order Placed!</h2>
    <p>Your order has been successfully placed.<br>
       Thank you for shopping with GreenNest 🌿</p>

    <button class="btn" onclick="goHome()">Continue Shopping</button>

    <div class="progress-bar">
        <div class="progress"></div>
    </div>

</div>

<script>
function goHome(){
    window.location.href = "index.html";
}

// AUTO REDIRECT AFTER 3 SECONDS
setTimeout(() => {
    window.location.href = "index.html";
}, 3000);
</script>

</body>
</html>
